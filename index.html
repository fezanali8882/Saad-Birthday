<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>THE LEGEND SAAD</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="matrix"></canvas>

<div id="particles"></div>

<audio id="bgMusic" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- SCREEN 1 -->

<section id="screen1" class="screen active">

<div class="glow"></div>

<div class="database typing">
ACCESSING BIRTHDAY DATABASE...
</div>

<h1 class="main-title">
THE LEGEND SAAD
</h1>

<p class="subtitle">
Target Located Successfully
</p>

<button class="btn" onclick="enterExperience()">
ENTER
</button>

</section>

<!-- SCREEN 2 -->

<section id="screen2" class="screen">

<h2>A Gift Is Waiting For You...</h2>

<div class="gift-box" onclick="openGift()">
🎁
</div>

</section>

<!-- SCREEN 3 -->

<section id="screen3" class="screen">

<h1 class="main-title">MEMORY VAULT</h1>

<div class="memory-card">
<img id="memoryImage" src="image1.jpg">
</div>

<button class="btn" onclick="nextMemory()">
NEXT MEMORY
</button>

</section>

<!-- SCREEN 4 -->

<section id="screen4" class="screen">

<div class="cake-icon" onclick="blowCandle()">
🎂
</div>

<h2>Tap The Cake</h2>

</section>

<!-- SCREEN 5 -->

<section id="screen5" class="screen">

<div class="achievement">

<h2>🏆 ACHIEVEMENT UNLOCKED</h2>

<h1>BEST FRIEND</h1>

<p>LEVEL: LEGENDARY</p>

<div class="xp-bar">
<div id="xpFill"></div>
</div>

</div>

<button class="btn" onclick="startCountdown()">
CONTINUE
</button>

</section>

<!-- SCREEN 6 -->

<section id="screen6" class="screen">

<div id="countdown" class="countdown">
3
</div>

</section>

<!-- SCREEN 7 -->

<section id="screen7" class="screen">

<img src="image3.jpg" class="final-photo">

<h1 class="main-title">
HAPPY BIRTHDAY SAAD ❤️
</h1>

<p class="subtitle">
FROM FAIZY ❤️
</p>

<button class="secret-btn" onclick="secretMessage()">
?
</button>

</section>

<script src="script.js"></script>

</body>
</html>
